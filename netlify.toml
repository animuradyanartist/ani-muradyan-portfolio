# Netlify configuration for animuradyan.com / ani-muradyan-portfolio

[build]
  publish = "_site"
  command = "bash scripts/build.sh"

# Cache busting / long-cache for fingerprintable assets (artwork JPEGs)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML should always revalidate
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Sensible default security headers for a static portfolio
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), camera=(), microphone=()"
